<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>
    
    <!-- Contact Section -->
    <section id="contact" class="contact section-reveal">
        <h2 class="section-title">Get In <span class="accent">Touch</span></h2>
        <div class="contact-container glass-panel">
            <p class="contact-msg">I am currently open for new opportunities. Whether you have a question or just
                want to say hi, I'll try my best to get back to you!</p>
            <div class="contact-info">
                <a href="mailto:sanketbacchanna@gmail.com" class="contact-link">
                    <i class="fa-solid fa-envelope"></i> sanketbacchanna@gmail.com
                </a>
                <a href="tel:9353350845" class="contact-link">
                    <i class="fa-solid fa-phone"></i> +91 9353350845
                </a>
            </div>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/sanketbacchanna" target="_blank" class="social-icon"
                    aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://github.com/Sanketbacchanna" target="_blank" class="social-icon" aria-label="GitHub"><i
                        class="fa-brands fa-github"></i></a>
            </div>
            <a href="mailto:sanketbacchanna@gmail.com" class="btn primary-btn" style="margin-top: 2rem;">Say
                Hello</a>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
